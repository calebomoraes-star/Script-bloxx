<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Promoções EB</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2a0f, #1b3a1b);
    color: #fff;
}

header {
    text-align: center;
    padding: 20px;
    background: #0d1f0d;
}

h1 {
    color: #4CAF50;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: #111;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.buttons {
    display: flex;
    justify-content: space-between;
}

button {
    width: 48%;
    padding: 10px;
    margin-top: 15px;
    background: #4CAF50;
    color: white;
    border: none;
}

#log {
    margin: 20px;
    padding: 15px;
    background: #000;
}
</style>

</head>

<body>

<header>
    <h1>Promoções EB</h1>
</header>

<div class="container">
    <input type="text" placeholder="Digite algo...">
    <select>
        <option>Opção 1</option>
        <option>Opção 2</option>
    </select>

    <div class="buttons">
        <button>Enviar</button>
        <button>Limpar</button>
    </div>
</div>

<div id="log">
    Logs aparecerão aqui...
</div>

</body>
</html>
