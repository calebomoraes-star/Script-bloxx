<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Promoções EB</title>

<style>
  body {
    background-color: #1b2a1b;
    color: #e0e0e0;
    font-family: Arial;
    text-align: center;
  }

  h1 {
    color: #4CAF50;
  }

  input, select, button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 5px;
  }

  button {
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background-color: #45a049;
  }

  #log {
    margin-top: 20px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>🪖 Exército Brasileiro RP</h1>

<p>Soldado → Cabo → Sargento → Tenente → Capitão</p>

<input id="nome" placeholder="Nome do soldado">

<select id="patente">
  <option>Soldado</option>
  <option>Cabo</option>
  <option>Sargento</option>
  <option>Tenente</option>
  <option>Capitão</option>
</select>

<br>

<button onclick="promover()">Promover</button>
<button onclick="limpar()">Limpar Log</button>

<div id="log"></div>

<script>
function salvar() {
  localStorage.setItem('log', document.getElementById('log').innerHTML);
}

function carregar() {
  document.getElementById('log').innerHTML = localStorage.getItem('log') || '';
}

function promover() {
  let nome = document.getElementById('nome').value;
  let patente = document.getElementById('patente').value;

  if (!nome) {
    alert('Digite o nome');
    return;
  }

  let log = document.getElementById('log');
  let p = document.createElement('p');

  p.innerText = nome + ' foi promovido para ' + patente;
  log.appendChild(p);

  salvar();
}

function limpar() {
  document.getElementById('log').innerHTML = '';
  localStorage.removeItem('log');
}

carregar();
</script>

</body>
</html>
