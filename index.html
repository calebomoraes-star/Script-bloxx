<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Promoções</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #050505;
            color: #f0f0f0;
            min-height: 100vh;
        }

        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #111;
            border-bottom: 1px solid #222;
        }

        .logo {
            background-color: #00a844;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            margin-right: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        /* Menu de Navegação */
        nav {
            display: flex;
            gap: 5px;
            margin-left: 30px;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px 8px 0 0;
            font-size: 15px;
            transition: 0.2s;
        }

        nav a.active {
            background-color: #1a1a1a;
            color: white;
            border-bottom: 3px solid #00a844;
        }

        nav a:hover {
            color: white;
        }

        /* Conteúdo Principal */
        .container {
            padding: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #00a844;
            font-size: 16px;
            margin-bottom: 25px;
        }

        /* Cards */
        .card {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 20px;
        }

        .card h3 {
            color: #888;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            color: #aaa;
        }

        .value {
            color: #fff;
            font-weight: 500;
        }

        /* Botões */
        .btn {
            background-color: #00a844;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #00c250;
            transform: scale(1.01);
        }

        /* Status e Tags */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            margin-right: 8px;
        }

        .tag.normal {
            background-color: #1565c0;
            color: white;
        }

        .tag.atipica {
            background-color: #fbc02d;
            color: #111;
        }

        .tag.ok {
            background-color: #00a844;
            color: white;
        }

        .tag.error {
            background-color: #c62828;
            color: white;
        }

        /* ESTILO DAS PATENTES COLORIDAS */
        .patente-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            text-shadow: 0px 0px 3px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        /* Tabela/Histórico */
        .table-row {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr 2fr;
            padding: 12px 0;
            border-bottom: 1px solid #222;
            align-items: center;
        }

        .table-header {
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">EB</div>
        <div class="title">Promoções</div>
        <nav>
            <a href="#" class="active" data-page="dashboard">Dashboard</a>
            <a href="#" data-page="promocao">Promoção</a>
            <a href="#" data-page="atipica">Atípica</a>
            <a href="#" data-page="rebaixamento">Rebaixamento</a>
            <a href="#" data-page="historico">Histórico</a>
        </nav>
    </div>

    <div class="container">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Exercito Brasileiro</p>

        <!-- Card de Identidade -->
        <div class="card">
            <h3>Identidade</h3>
            <div class="info-row">
                <span class="label">Username</span>
                <span class="value">calebminio</span>
            </div>
            <div class="info-row">
                <span class="label">Roblox ID</span>
                <span class="value">3006425578</span>
            </div>
            <div class="info-row">
                <span class="label">Admin</span>
                <span class="value">não</span>
            </div>
        </div>

        <!-- Card de Grupo -->
        <div class="card">
            <h3>Grupo: Exercito Brasileiro</h3>
            <div class="info-row">
                <span class="label">Patente</span>
                <span class="value">
                    <span class="patente-tag" style="background-color: #FFA726;">[GEN BDA] General de Brigada</span>
                </span>
            </div>
            <div class="info-row">
                <span class="label">CGEx</span>
                <span class="value">não</span>
            </div>
            <div class="info-row">
                <span class="label">Afiliados</span>
                <span class="value">não</span>
            </div>
            <div class="info-row">
                <span class="label">Elite Gamepass</span>
                <span class="value">não</span>
            </div>
        </div>

        <button class="btn" id="btnSair">Sair</button>
    </div>

<script>
    // ==============================================
    // LISTA DE TODAS AS PATENTES COM SUAS CORES
    // ==============================================
    const patentes = [
        { cod: "CADETE", nome: "Cadete", cor: "#B0BEC5" },
        { cod: "ASP", nome: "Aspirante a Oficial", cor: "#BA68C8" },
        { cod: "1-TEN", nome: "Primeiro Tenente", cor: "#BA68C8" },
        { cod: "2-TEN", nome: "Segundo Tenente", cor: "#BA68C8" },
        { cod: "CAP", nome: "Capitão", cor: "#EF5350" },
        { cod: "MAJ", nome: "Major", cor: "#FFEE58", colorText: "#000" },
        { cod: "TEN-CEL", nome: "Tenente Coronel", cor: "#FFEE58", colorText: "#000" },
        { cod: "CEL", nome: "Coronel", cor: "#FFEE58", colorText: "#000" },
        { cod: "GEN-BDA", nome: "General de Brigada", cor: "#FFA726" },
        { cod: "GEN-DIV", nome: "General de Divisão", cor: "#FFA726" },
        { cod: "GEN-EX", nome: "General de Exército", cor: "#FFA726" },
        { cod: "EM", nome: "Elite Militar", cor: "#6C5CE7" },
        { cod: "ES", nome: "Elite Secreta", cor: "#81D4FA", colorText: "#000" },
        { cod: "ER", nome: "Elite Real", cor: "#F48FB1" },
        { cod: "CMDT", nome: "Comandante", cor: "#E53935" },
        { cod: "SUB-COM", nome: "Subcomandante", cor: "#E53935" },
        { cod: "PRES", nome: "Presidente", cor: "#455A64" },
        { cod: "VICE", nome: "Vice Presidente", cor: "#455A64" },
        { cod: "MA", nome: "Manager", cor: "#29B6F6" },
        { cod: "SC", nome: "Sócios", cor: "#29B6F6" },
        { cod: "CREATOR", nome: "Criador", cor: "#FFD600", colorText: "#000" },
        { cod: "SUB-CRIADOR", nome: "Sub Criadores", cor: "#FFD600", colorText: "#000" }
    ];

    // ==============================================
    // REGRAS DE QUEM PODE PROMOVER ATÉ QUEM
    // ==============================================
    const regrasPermissao = {
        "ASP": 0,      // Aspirante promove só até Cadete
        "1-TEN": 1,    // Primeiro Tenente promove até Aspirante
        "2-TEN": 2,    // Segundo Tenente promove até 1º Tenente
        "CAP": 3,      // Capitão promove até 2º Tenente
        "MAJ": 4,      // Major promove até Capitão
        "TEN-CEL": 5,  // Tenente Coronel promove até Major
        "CEL": 6,      // Coronel promove até Tenente Coronel
        "GEN-BDA": 7,  // General de Brigada promove até Coronel
        "GEN-DIV": 8,  // General de Divisão promove até Gen de Brigada
        "GEN-EX": 9,   // General de Exército promove até Gen de Divisão
        "EM": 10,      // Elite Militar promove até Gen de Exército
        "ES": 11,      // Elite Secreta promove até Elite Militar
        "ER": 12,      // Elite Real promove até Elite Secreta
        "CMDT": 99,    // Comandante pode TUDO
        "PRES": 99,    // Presidente pode TUDO
        "MA": 99,      // Manager pode TUDO
        "CREATOR": 99, // Criador pode TUDO
        "SUB-CRIADOR": 99
    };

    // ==============================================
    // FUNÇÕES DO SISTEMA
    // ==============================================
    
    // Mudar página no menu
    document.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Remove active de todos
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
            
            // Adiciona no clicado
            this.classList.add('active');

            // Atualiza título da página
            const pagina = this.getAttribute('data-page');
            document.querySelector('.page-title').textContent = this.textContent;
            
            alert(`Você abriu a página: ${this.textContent}`);
        });
    });

    // Botão Sair
    document.getElementById('btnSair').addEventListener('click', function() {
        alert('Saindo do sistema...');
    });

    // Função para verificar permissão
    function podePromover(codPatenteQuemPromove, codPatenteAlvo) {
        const idxQuem = patentes.findIndex(p => p.cod === codPatenteQuemPromove);
        const idxAlvo = patentes.findIndex(p => p.cod === codPatenteAlvo);
        
        const maximo = regrasPermissao[codPatenteQuemPromove] || 0;

        // Verifica se o alvo está dentro do limite permitido
        if (idxAlvo <= idxQuem - 1 && idxAlvo >= (idxQuem - 1 - maximo)) {
            return true;
        } else {
            return false;
        }
    }

    // Função para criar a tag HTML da patente
    function criarTagPatente(cod) {
        const p = patentes.find(x => x.cod === cod);
        const tag = document.createElement("span");
        tag.className = "patente-tag";
        tag.style.backgroundColor = p.cor;
        tag.style.color = p.colorText || "white";
        tag.textContent = `[${p.cod}] ${p.nome}`;
        return tag;
    }

    console.log("Sistema EB Promoções Carregado! ✅");
    console.log("Todas as patentes e regras carregadas.");

</script>

</body>
</html>
