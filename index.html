<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Promoções EB</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2a0f, #1b3a1b);
    color: #fff;
}

header {
    text-align: center;
    padding: 20px;
    background: #0d1f0d;
}

h1 {
    color: #4CAF50;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: #111;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    width: 48%;
    padding: 10px;
    margin-top: 15px;
    background: #4CAF50;
    color: white;
    border: none;
}

.buttons {
    display: flex;
    justify-content: space-between;
}

#log {
    margin: 20px;
    padding: 15px;
    background: #000;
}
</style>
</head>

<body>

<header>
    <h1>🪖 Exército Brasileiro RP</h1>
</header>

<div class="container">
    <input type="text" id="nome" placeholder="Nome do soldado">

    <select id="patente">
        <option>Soldado</option>
        <option>Cabo</option>
        <option>Sargento</option>
        <option>Tenente</option>
        <option>Capitão</option>
    </select>

    <div class="buttons">
        <button onclick="promover()">Promover</button>
        <button onclick="limpar()">Limpar</button>
    </div>
</div>

<div id="log"></div>

<script>
function salvar() {
    localStorage.setItem("log", document.getElementById("log").innerHTML);
}

function carregar() {
    document.getElementById("log").innerHTML = localStorage.getItem("log") || "";
}

function promover() {
    let nome = document.getElementById("nome").value;
    let patente = document.getElementById("patente").value;

    if (!nome) {
        alert("Digite o nome");
        return;
    }

    let log = document.getElementById("log");

    let p = document.createElement("p");
    p.innerText = nome + " foi promovido para " + patente;

    log.appendChild(p);

    salvar();
}

function limpar() {
    document.getElementById("log").innerHTML = "";
    localStorage.removeItem("log");
}

carregar();
</script>

</body>
</html>
